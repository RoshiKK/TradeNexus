services:
  # 1. API Gateway
  - type: web
    name: tradenexus-gateway
    env: node
    plan: free
    rootDir: api-gateway
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        value: super-secret-key-change-me
      - key: USER_SERVICE_URL
        fromService:
          type: web
          name: tradenexus-user-service
          property: host
      - key: PRODUCT_SERVICE_URL
        fromService:
          type: web
          name: tradenexus-product-service
          property: host
      - key: ORDER_SERVICE_URL
        fromService:
          type: web
          name: tradenexus-order-service
          property: host
      - key: PAYMENT_SERVICE_URL
        fromService:
          type: web
          name: tradenexus-payment-service
          property: host

  # 2. User Service
  - type: web
    name: tradenexus-user-service
    env: node
    plan: free
    rootDir: user-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false # You will paste your MongoDB Atlas link here in Render dashboard
      - key: JWT_SECRET
        value: super-secret-key-change-me

  # 3. Product Service
  - type: web
    name: tradenexus-product-service
    env: node
    plan: free
    rootDir: product-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false

  # 4. Order Service
  - type: web
    name: tradenexus-order-service
    env: node
    plan: free
    rootDir: order-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: PRODUCT_SERVICE_URL
        fromService:
          type: web
          name: tradenexus-product-service
          property: host
      - key: PAYMENT_SERVICE_URL
        fromService:
          type: web
          name: tradenexus-payment-service
          property: host

  # 5. Payment Service
  - type: web
    name: tradenexus-payment-service
    env: node
    plan: free
    rootDir: payment-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false

  # 6. Frontend
  - type: web
    name: tradenexus-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: tradenexus-gateway
          property: host
